<!DOCTYPE html>

  <!-- Header -->
  <header>
    <img src="logo.png" alt="Healthify Lab" style="height: 60px; margin: 20px;" />

      <a href="index.html">🏠 Home</a>
      <a href="about.html">ℹ️ About</a>

  </header>

  <!-- Contact Form -->
  <main style="padding: 20px;">
    <h2>Contact Us</h2>
    <p>Have questions or need support? Send us a message below:</p>

    <form action="mailto:report@healthifylab.com" method="POST" enctype="text/plain">
      <label for="name">Patient Name:</label><br />
      <input type="text" id="name" name="name" required /><br /><br />

      <label for="email">Email Address:</label><br />
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="query">Your Query:</label><br />
      <textarea id="query" name="query" rows="5" required></textarea><br /><br />

      <button type="submit">Send Message</button>
    </form>
  </main>

  <!-- Footer -->
  <footer>
    <p>📞 +91 9503832889 | ✉️ report@healthifylab.com</p>
    <p>&copy; 2025 Healthify Lab. All rights reserved.</p>
  </footer>
