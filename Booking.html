<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Test – Healthify Lab</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script type="module" src="firebase.js"></script>
  <script defer src="script.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="logo.png" alt="Healthify Lab" style="height: 60px; margin: 20px;" />
    <nav>
      <a href="index.html">🏠 Home</a>
      <a href="about.html">ℹ️ About</a>
      <a href="contact.html">📬 Contact</a>
      <a href="booking.html">🧾 Book Test</a>
    </nav>
  </header>

  <!-- Booking Form -->
  <main style="padding: 20px;">
    <h2>Book a Blood Test</h2>

    <form id="bookingForm">
      <label>Prefix:</label>
      <select name="prefix" required>
        <option>Mr.</option>
        <option>Ms.</option>
        <option>Mrs.</option>
      </select><br /><br />

      <label>Full Name:</label><br />
      <input type="text" name="name" required /><br /><br />

      <label>Age:</label><br />
      <input type="number" name="age" required /><br /><br />

      <label>Gender:</label><br />
      <select name="gender" required>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select><br /><br />

      <label>Mobile Number:</label><br />
      <input type="tel" name="mobile" required /><br /><br />

      <label>Email Address:</label><br />
      <input type="email" name="email" required /><br /><br />

      <label>Address:</label><br />
      <textarea name="address" required></textarea><br /><br />

      <label>Pincode:</label><br />
      <input type="text" name="pincode" required /><br /><br />

      <label>Appointment Date & Time:</label><br />
      <input type="datetime-local" name="appointment" required /><br /><br />

      <label>Select Tests:</label><br />
      <select multiple name="tests" id="testSelect" required>
        <option value="CBC">CBC – ₹399 (MRP: <s>₹499</s>)</option>
        <option value="Thyroid">Thyroid Panel – ₹599 (MRP: <s>₹749</s>)</option>
        <option value="Vitamin D">Vitamin D – ₹799 (MRP: <s>₹999</s>)</option>
      </select><br /><br />

      <label>Select Profiles:</label><br />
      <select multiple name="profiles" id="profileSelect">
        <option value="Full Body Basic">Full Body Basic – ₹999 (MRP: <s>₹1499</s>)</option>
        <option value="Diabetes Panel">Diabetes Panel – ₹699 (MRP: <s>₹899</s>)</option>
      </select><br /><br />

      <div id="summary">
        <p><strong>Total MRP:</strong> ₹0</p>
        <p><strong>Healthify Offer:</strong> ₹0</p>
        <p><strong>You Save:</strong> ₹0</p>
      </div><br />

      <button type="submit">📩 Book Now</button>
    </form>

    <div id="successMessage" style="display:none; color: green; font-weight: bold; margin-top: 20px;">
      ✅ Booking successful! Confirmation sent via Email & WhatsApp.
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>📞 +91 9503832889 | ✉️ report@healthifylab.com</p>
    <p>&copy; 2025 Healthify Lab. All rights reserved.</p>
  </footer>

</body>
</html>
